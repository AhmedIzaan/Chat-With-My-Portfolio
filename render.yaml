services:
  - type: web
    name: chat-portfolio-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # Set manually in Render dashboard (never commit this)
      - key: ALLOWED_ORIGINS
        value: "*"           # Replace with your Vercel URL after deploying frontend
      - key: CHROMA_DB_PATH
        value: /tmp/chroma_db
      - key: RESUME_FILE_PATH
        value: data/AhmedIzaan_Resume.pdf
      - key: PROFILE_FILE_PATH
        value: data/profile.txt
      - key: EMBEDDING_MODEL
        value: models/gemini-embedding-001
      - key: CHAT_MODEL
        value: gemini-2.5-flash
      - key: TEMPERATURE
        value: "0.3"
      - key: MAX_TOKENS
        value: "1000"
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "100"
